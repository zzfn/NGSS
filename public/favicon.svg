<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 深色圆角背景 -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>

  <!--
    三段独立笔画构成 N，顺序：左竖 → 斜线 → 右竖
    每段先画宽深色描边（形成边框分隔），再画窄白色填充
    round linecap 产生胶囊/圆润端点，与 logo.png 一致
  -->

  <!-- 左竖 -->
  <line x1="8" y1="5.5" x2="8" y2="26.5" stroke="#0f1117" stroke-width="8"   stroke-linecap="round"/>
  <line x1="8" y1="5.5" x2="8" y2="26.5" stroke="white"   stroke-width="5.5" stroke-linecap="round"/>

  <!-- 斜线（左上 → 右下） -->
  <line x1="8" y1="5.5" x2="24" y2="26.5" stroke="#0f1117" stroke-width="8"   stroke-linecap="round"/>
  <line x1="8" y1="5.5" x2="24" y2="26.5" stroke="white"   stroke-width="5.5" stroke-linecap="round"/>

  <!-- 右竖 -->
  <line x1="24" y1="5.5" x2="24" y2="26.5" stroke="#0f1117" stroke-width="8"   stroke-linecap="round"/>
  <line x1="24" y1="5.5" x2="24" y2="26.5" stroke="white"   stroke-width="5.5" stroke-linecap="round"/>
</svg>
